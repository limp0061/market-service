services:
  mysql:
    image: mysql:8.4
    container_name: market-mysql
    restart: always
    ports:
      - "13306:3306"
    environment:
      MYSQL_DATABASE: marketdb
      MYSQL_ROOT_HOST: "%"
      MYSQL_ROOT_PASSWORD: password1234
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.2-alpine
    container_name: market-redis
    restart: always
    ports:
      - "16379:6379"

  mongodb:
    image: mongo:8.0
    container_name: market-chat-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=password1234
      - MONGO_INITDB_DATABASE=marketdb
    volumes:
      - mongo_data:/data/db

volumes:
  mysql_data:
  mongo_data: